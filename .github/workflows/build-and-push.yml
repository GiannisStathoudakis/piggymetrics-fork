name: Build and Push

on:
  push:
    branches:
      - master
    paths:
      - 'account-service/**'
      - 'auth-service/**'
      - 'config/**'
      - 'gateway/**'
      - 'notification-service/**'
      - 'registry/**'
      - 'statistics-service/**'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: 
          - account-service
          - auth-service
          - config
          - gateway
          - notification-service
          - registry
          - statistics-service

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v5
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean package -DskipTests -f ${{ matrix.service }}/pom.xml

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v7
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ghcr.io/giannisstathoudakis/piggymetrics-fork-${{ matrix.service }}:latest