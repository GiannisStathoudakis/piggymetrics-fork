{{- range .Values.microservices }}
{{- if .isApiGateway }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: piggymetrics-route
  namespace: {{ $.Release.Namespace }}
spec:
  parentRefs:
  - name: lab-gateway
    namespace: gateway
  hostnames: 
  - {{ $.Values.domain | quote }}
  rules:
  - backendRefs:
    - name: {{ .name }}
      port: {{ .port }}
{{- end }}
{{- end }}